<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneSync WebUI</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #16243a;
      --panel: #17263d;
      --panel-soft: #1e324f;
      --border: #3f5575;
      --text: #eef5ff;
      --muted: #b6c7e1;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --warn: #f59e0b;
      --danger: #f87171;
      --input: #233957;
      --hover: #2b4466;
      --mono: "JetBrains Mono", "Fira Code", monospace;
      --sans: "Fira Sans", "Noto Sans SC", "Segoe UI", sans-serif;
      --row-pad-y: 8px;
      --row-pad-x: 10px;
      --font-size: 13px;
    }

    [data-theme="light"] {
      --bg: #f3f7fc;
      --bg-soft: #eef4fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --border: #d5e1f0;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-2: #16a34a;
      --warn: #b45309;
      --danger: #b91c1c;
      --input: #ffffff;
      --hover: #f1f6fd;
    }

    [data-theme="ocean"] {
      --bg: #10293a;
      --bg-soft: #16384f;
      --panel: #1a3f58;
      --panel-soft: #21506f;
      --border: #4e7390;
      --text: #effbff;
      --muted: #bfdbe9;
      --accent: #67e8f9;
      --accent-2: #34d399;
      --warn: #fbbf24;
      --danger: #fb7185;
      --input: #265b79;
      --hover: #2d6788;
    }

    [data-density="comfortable"] {
      --row-pad-y: 10px;
      --row-pad-x: 12px;
      --font-size: 14px;
    }

    [data-density="compact"] {
      --row-pad-y: 7px;
      --row-pad-x: 10px;
      --font-size: 13px;
    }

    [data-density="ultra-compact"] {
      --row-pad-y: 5px;
      --row-pad-x: 8px;
      --font-size: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(150deg, var(--bg), var(--bg-soft));
      color: var(--text);
      font-family: var(--sans);
    }

    .container {
      width: min(1400px, 100% - 24px);
      margin: 16px auto 20px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(150deg, var(--panel), var(--panel-soft));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      padding: 12px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .title-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 180px 140px 140px;
      gap: 8px;
      margin-bottom: 10px;
    }

    .quick-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .quick-actions .hint {
      color: var(--muted);
      font-size: 12px;
    }

    input,
    select,
    button {
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }

    input::placeholder {
      color: var(--muted);
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.18);
    }

    button {
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      background: var(--hover);
    }

    button.primary {
      background: color-mix(in srgb, var(--accent) 20%, var(--input));
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
    }

    button.success {
      background: color-mix(in srgb, var(--accent-2) 20%, var(--input));
      border-color: color-mix(in srgb, var(--accent-2) 50%, var(--border));
    }

    button.warn {
      background: color-mix(in srgb, var(--warn) 18%, var(--input));
      border-color: color-mix(in srgb, var(--warn) 48%, var(--border));
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      max-height: 64vh;
      background: var(--panel);
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      font-size: var(--font-size);
      color: var(--text);
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: left;
      font-size: calc(var(--font-size) - 1px);
      letter-spacing: 0.02em;
      color: var(--muted);
      background: var(--panel-soft);
      border-bottom: 1px solid var(--border);
      padding: var(--row-pad-y) var(--row-pad-x);
    }

    tbody td {
      border-bottom: 1px solid var(--border);
      padding: var(--row-pad-y) var(--row-pad-x);
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(56, 189, 248, 0.09);
    }

    .mono {
      font-family: var(--mono);
      font-size: calc(var(--font-size) - 1px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: calc(var(--font-size) - 1px);
      font-weight: 700;
      padding: 2px 9px;
      border: 1px solid transparent;
    }

    .b-up_to_date {
      color: #166534;
      background: rgba(34, 197, 94, 0.16);
    }

    .b-outdated {
      color: #92400e;
      background: rgba(245, 158, 11, 0.22);
    }

    .b-unknown {
      color: #1d4ed8;
      background: rgba(96, 165, 250, 0.2);
    }

    .b-disabled {
      color: #475569;
      background: rgba(148, 163, 184, 0.2);
    }

    .job-panel {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .job-title {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .job-body {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
    }

    .debug-panel {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.02);
    }

    .debug-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .debug-title {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .debug-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .debug-tab {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 70%, var(--input) 30%);
      color: var(--text);
      cursor: pointer;
    }

    .debug-tab.active {
      border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
      background: color-mix(in srgb, var(--accent) 24%, var(--input) 76%);
      font-weight: 700;
    }

    .debug-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .debug-tools input {
      min-width: 220px;
    }

    .debug-log-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 80%, #000 20%);
      max-height: 320px;
      overflow: auto;
    }

    .debug-log-list {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      padding: 6px;
    }

    .debug-empty {
      color: var(--muted);
      padding: 8px 6px;
    }

    .debug-line {
      border-bottom: 1px dashed color-mix(in srgb, var(--border) 70%, transparent);
      padding: 3px 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .debug-line:last-child {
      border-bottom: none;
    }

    .debug-ts {
      color: var(--muted);
      margin-right: 6px;
    }

    .debug-level {
      font-weight: 700;
      margin-right: 6px;
    }

    .debug-source {
      color: color-mix(in srgb, var(--text) 70%, var(--muted) 30%);
      margin-right: 6px;
    }

    .debug-target {
      color: var(--accent);
      margin-right: 6px;
    }

    .l-debug .debug-level { color: #60a5fa; }
    .l-info .debug-level { color: #34d399; }
    .l-warn .debug-level { color: var(--warn); }
    .l-error .debug-level { color: var(--danger); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 15, 30, 0.72);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 1200;
    }

    .hidden {
      display: none !important;
    }

    .modal-panel {
      width: min(1120px, 100%);
      max-height: 92vh;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(160deg, var(--panel), var(--panel-soft));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel-soft) 78%, var(--panel) 22%);
    }

    .modal-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-body {
      padding: 10px 12px;
      overflow: auto;
    }

    .cfg-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 8px 10px;
    }

    .cfg-block {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.02);
    }

    .cfg-title {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .cfg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cfg-row-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cfg-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .cfg-label input,
    .cfg-label select,
    .cfg-label textarea {
      margin-top: 1px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      padding: 7px 10px;
      font-size: 12px;
      font-family: var(--mono);
      line-height: 1.45;
    }

    .cfg-target-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .cfg-target-list {
      display: grid;
      gap: 8px;
    }

    .cfg-target-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: color-mix(in srgb, var(--panel) 80%, var(--input) 20%);
    }

    .cfg-mini {
      font-size: 11px;
      color: var(--muted);
    }

    .cfg-status {
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      white-space: pre-wrap;
    }

    .cfg-status.ok {
      color: var(--accent-2);
    }

    .cfg-status.err {
      color: var(--danger);
    }

    @media (max-width: 980px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .cfg-grid,
      .cfg-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-theme="slate" data-density="compact">
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title" id="mainTitle">OneSync 运维控制台</h1>
        <p class="title-sub" id="lastRefresh">最后刷新: -</p>
      </div>
      <div class="top-actions">
        <button id="refreshBtn">刷新</button>
        <button id="themeBtn">切换主题</button>
        <select id="langSelect">
          <option value="zh" selected>中文</option>
          <option value="en">English</option>
        </select>
        <select id="densitySelect">
          <option value="comfortable">舒适</option>
          <option value="compact" selected>紧凑</option>
          <option value="ultra-compact">极限紧凑</option>
        </select>
      </div>
    </div>

    <div class="chip-row" id="chipRow"></div>

    <div class="quick-actions">
      <button id="runFilteredBtn" class="success">立即更新（当前筛选）</button>
      <button id="runAllBtn" class="warn">立即全部更新（全部纳管）</button>
      <span class="hint" id="quickHint">按钮会二次确认，避免误触。当前运行中时会自动禁用。</span>
    </div>

    <div class="controls">
      <input id="searchInput" type="text" placeholder="搜索软件 / 版本 / 策略">
      <select id="statusFilter">
        <option value="all" id="statusOptAll">全部状态</option>
        <option value="up_to_date" id="statusOptUtd">已最新</option>
        <option value="outdated" id="statusOptOutdated">可更新</option>
        <option value="unknown" id="statusOptUnknown">待检查</option>
        <option value="disabled" id="statusOptDisabled">已停用</option>
      </select>
      <button id="clearFilterBtn">清空筛选</button>
      <button id="openConfigBtn" class="primary">打开插件配置</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th id="thSoftware">软件</th>
            <th id="thCurrent">当前版本</th>
            <th id="thLatest">最新版本</th>
            <th id="thStatus">状态</th>
            <th id="thStrategy">策略</th>
            <th id="thEnabled">启用</th>
            <th id="thCheckedAt">最近检查</th>
          </tr>
        </thead>
        <tbody id="rowsBody"></tbody>
      </table>
    </div>

    <div class="job-panel">
      <p class="job-title" id="jobTitle">最近执行任务</p>
      <p class="job-body" id="jobInfo">暂无任务</p>
    </div>

    <div class="debug-panel">
      <div class="debug-head">
        <p class="debug-title" id="debugTitle">Debug 日志（实时）</p>
        <div class="debug-tabs" id="debugTabs">
          <button class="debug-tab active" data-group="all" id="tabAll">全部</button>
          <button class="debug-tab" data-group="run" id="tabRun">运行日志</button>
          <button class="debug-tab" data-group="target" id="tabTarget">目标日志</button>
          <button class="debug-tab" data-group="scheduler" id="tabScheduler">调度日志</button>
          <button class="debug-tab" data-group="system" id="tabSystem">系统日志</button>
        </div>
        <div class="debug-tools">
          <select id="debugLevelFilter">
            <option value="all" selected id="dbgLevelAll">全部级别</option>
            <option value="info">INFO</option>
            <option value="warn">WARN</option>
            <option value="error">ERROR</option>
            <option value="debug">DEBUG</option>
          </select>
          <input id="debugKeywordInput" type="text" placeholder="筛选关键字（target/source/message）">
          <button id="debugToggleScrollBtn" class="primary">自动滚动: 开</button>
          <button id="debugClearBtn">清空日志</button>
        </div>
      </div>
      <div class="debug-log-wrap" id="debugLogWrap">
        <div class="debug-log-list" id="debugLogList">
          <div class="debug-empty">暂无调试日志</div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="configModal">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 class="modal-title" id="cfgModalTitle">OneSync 插件配置</h2>
        <div class="modal-actions">
          <button id="cfgReloadBtn">重新加载</button>
          <button id="cfgSaveBtn" class="success">保存配置</button>
          <button id="cfgCloseBtn">关闭</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="cfg-block">
          <p class="cfg-title" id="cfgGeneralTitle">基础设置</p>
          <div class="cfg-grid">
            <label class="cfg-label">
              <span id="cfgLabelEnabled">启用插件</span>
              <select id="cfgEnabled">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="cfg-label">
              <span id="cfgLabelTargetMode">目标配置模式</span>
              <select id="cfgTargetMode">
                <option value="human">human</option>
                <option value="developer">developer</option>
              </select>
            </label>
            <label class="cfg-label">
              <span id="cfgLabelPoll">轮询间隔（分钟）</span>
              <input id="cfgPollInterval" type="number" min="1" step="1">
            </label>
            <label class="cfg-label">
              <span id="cfgLabelDefaultCheck">默认检查间隔（小时）</span>
              <input id="cfgDefaultCheckInterval" type="number" min="0" step="0.5">
            </label>
            <label class="cfg-label">
              <span id="cfgLabelAutoUpdate">定时自动更新</span>
              <select id="cfgAutoUpdate">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="cfg-label">
              <span id="cfgLabelNotifyAdmin">定时通知管理员</span>
              <select id="cfgNotifyAdmin">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="cfg-label">
              <span id="cfgLabelNotifyNoop">无更新也通知</span>
              <select id="cfgNotifyNoop">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="cfg-label" id="cfgDryRunWrap">
              <span id="cfgLabelDryRun">演练模式</span>
              <select id="cfgDryRun">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="cfg-label" id="cfgEnvTimeoutWrap">
              <span id="cfgLabelEnvTimeout">环境检测超时（秒）</span>
              <input id="cfgEnvTimeout" type="number" min="1" step="1">
            </label>
            <label class="cfg-label">
              <span id="cfgLabelAdminSid">管理员 SID 列表（逗号或换行）</span>
              <textarea id="cfgAdminSidList"></textarea>
            </label>
          </div>
        </div>

        <div class="cfg-block">
          <p class="cfg-title" id="cfgWebTitle">WebUI 设置</p>
          <div class="cfg-row">
            <label class="cfg-label">
              <span id="cfgLabelWebEnabled">启用 WebUI</span>
              <select id="cfgWebEnabled">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="cfg-label">
              <span id="cfgLabelWebPort">WebUI 端口</span>
              <input id="cfgWebPort" type="number" min="1" max="65535" step="1">
            </label>
            <label class="cfg-label">
              <span id="cfgLabelWebHost">WebUI Host</span>
              <input id="cfgWebHost" type="text" placeholder="127.0.0.1">
            </label>
            <label class="cfg-label">
              <span id="cfgLabelWebPassword">WebUI 密码（可选）</span>
              <input id="cfgWebPassword" type="text" placeholder="">
            </label>
          </div>
        </div>

        <div class="cfg-block" id="cfgHumanWrap">
          <div class="cfg-target-head">
            <p class="cfg-title" id="cfgHumanTitle">软件目标（Human 模式）</p>
            <div class="modal-actions">
              <select id="cfgAddTargetType">
                <option value="cargo_path_git">cargo_path_git</option>
                <option value="command">command</option>
                <option value="system_package">system_package</option>
              </select>
              <button id="cfgAddTargetBtn" class="primary">添加目标</button>
            </div>
          </div>
          <div class="cfg-target-list" id="cfgHumanTargetList"></div>
          <p class="cfg-mini" id="cfgHumanHint">可添加任意数量目标；字段会按 strategy 自动切换。</p>
        </div>

    function t(key, vars = {}) {
      const langPack = I18N[state.lang] || I18N.zh;
      let raw = langPack[key] || I18N.zh[key] || key;
      Object.keys(vars || {}).forEach((name) => {
        raw = raw.replace(new RegExp(`\\{${name}\\}`, "g"), String(vars[name]));
      });
      return raw;
    }

    function toLocalTime(text) {
      if (!text || text === "-") return "-";
      const ms = Date.parse(text);
      if (Number.isNaN(ms)) return text;
      return new Date(ms).toLocaleString();
    }

    function rowStatusLabel(status) {
      const mapping = {
        up_to_date: t("status_up_to_date"),
        outdated: t("status_outdated"),
        unknown: t("status_unknown"),
        disabled: t("status_disabled")
      };
      return mapping[status] || t("status_unknown");
    }

    function applyPreferences() {
      try {
        const raw = localStorage.getItem("onesync:webui:prefs");
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.theme && state.themes.includes(parsed.theme)) {
          state.themeIndex = state.themes.indexOf(parsed.theme);
        }
        if (parsed.density && ["comfortable", "compact", "ultra-compact"].includes(parsed.density)) {
          state.density = parsed.density;
        }
        if (parsed.lang && ["zh", "en"].includes(parsed.lang)) {
          state.lang = parsed.lang;
        }
      } catch (_err) {}
      document.body.dataset.theme = state.themes[state.themeIndex];
      document.body.dataset.density = state.density;
      $("densitySelect").value = state.density;
      $("langSelect").value = state.lang;
    }

    function persistPreferences() {
      const payload = {
        theme: state.themes[state.themeIndex],
        density: state.density,
        lang: state.lang
      };
      try {
        localStorage.setItem("onesync:webui:prefs", JSON.stringify(payload));
      } catch (_err) {}
    }

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (!headers["Content-Type"] && options.method && options.method !== "GET") {
        headers["Content-Type"] = "application/json";
      }
      if (state.token) {
        headers["Authorization"] = `Bearer ${state.token}`;
      }
      const fetchOptions = Object.assign({}, options, { headers });
      const tryPaths = [String(path || "")];
      if (typeof path === "string" && path.startsWith("/api/")) {
        tryPaths.push("." + path);
      }

      let lastError = null;
      for (const targetPath of tryPaths) {
        const resp = await fetch(targetPath, fetchOptions);
        const payload = await resp.json().catch(() => ({}));
        if (resp.ok) {
          return payload;
        }
        const err = new Error(
          payload.message || payload.error || `${resp.status} ${resp.statusText}`,
        );
        err.statusCode = resp.status;
        lastError = err;
        // 404 在某些部署拓扑下可通过相对路径重试修复；其他错误不重试。
        if (resp.status !== 404) {
          break;
        }
      }
      throw lastError || new Error("Request failed");
    }

    async function ensureAuth() {
      const info = await api("/api/auth-info");
      if (!info.auth_required) return;
      const password = window.prompt(
        state.lang === "en" ? "Enter OneSync WebUI password" : "请输入 OneSync WebUI 密码",
      );
      if (password === null) throw new Error(t("err_login_cancel"));
      const login = await api("/api/login", {
        method: "POST",
        body: JSON.stringify({ password })
      });
      state.token = login.token || "";
    }

    function buildChips(counts, total) {
      const chips = [
        t("chip_total", { n: total }),
        t("chip_up_to_date", { n: counts.up_to_date || 0 }),
        t("chip_outdated", { n: counts.outdated || 0 }),
        t("chip_unknown", { n: counts.unknown || 0 }),
        t("chip_disabled", { n: counts.disabled || 0 }),
      ];
      $("chipRow").innerHTML = chips.map((item) => `<span class="chip">${item}</span>`).join("");
    }

    function applyFilters() {
      const kw = state.keyword.trim().toLowerCase();
      state.filteredRows = state.rows.filter((row) => {
        if (state.status !== "all" && row.status !== state.status) return false;
        if (!kw) return true;
        const searchText = [
          row.software_name,
          row.current_version,
          row.latest_version,
          row.strategy,
          row.enabled ? "enabled" : "disabled",
          row.last_checked_at
        ].join(" ").toLowerCase();
        return searchText.includes(kw);
      });
    }

    function renderRows() {
      const body = $("rowsBody");
      if (!state.filteredRows.length) {
        body.innerHTML = `<tr><td colspan="7" style="color: var(--muted);">${t("no_rows")}</td></tr>`;
        return;
      }
      body.innerHTML = state.filteredRows.map((row) => `
        <tr>
          <td>${row.software_name}</td>
          <td class="mono">${row.current_version}</td>
          <td class="mono">${row.latest_version}</td>
          <td><span class="badge b-${row.status}">${rowStatusLabel(row.status)}</span></td>
          <td>${row.strategy}</td>
          <td>${row.enabled ? t("yes") : t("no")}</td>
          <td>${toLocalTime(row.last_checked_at)}</td>
        </tr>
      `).join("");
    }

    function renderJob() {
      const target = $("jobInfo");
      if (!state.latestJob) {
        target.textContent = t("job_none");
        return;
      }
      const job = state.latestJob;
      const lines = [
        `${t("job_id")}: ${job.id || "-"}`,
        `${t("job_status")}: ${job.status || "-"}`,
        `${t("job_scope")}: ${job.scope || "-"}`,
        `${t("job_target_count")}: ${job.total_targets || 0}`,
        `${t("job_started")}: ${toLocalTime(job.started_at || job.created_at || "-")}`,
        `${t("job_finished")}: ${toLocalTime(job.finished_at || "-")}`,
        `${t("job_summary")}: ${job.summary || "-"}`,
      ];
      target.textContent = lines.join("\n");
    }

    function escapeHtml(input) {
      return String(input || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function syncDebugAutoScrollBtn() {
      $("debugToggleScrollBtn").textContent = state.debugAutoScroll
        ? t("auto_scroll_on")
        : t("auto_scroll_off");
    }

    function syncDebugTabButtons() {
      const tabRoot = $("debugTabs");
      if (!tabRoot) return;
      tabRoot.querySelectorAll("[data-group]").forEach((el) => {
        const group = el.getAttribute("data-group") || "all";
        if (group === state.debugSourceGroup) {
          el.classList.add("active");
        } else {
          el.classList.remove("active");
        }
      });
    }

    function renderDebugLogs() {
      const list = $("debugLogList");
      const wrap = $("debugLogWrap");
      if (!state.debugLogs.length) {
        list.innerHTML = `<div class="debug-empty">${t("debug_empty")}</div>`;
        return;
      }
      list.innerHTML = state.debugLogs.map((item) => {
        const level = String(item.level || "info").toLowerCase();
        const source = escapeHtml(item.source || "-");
        const target = escapeHtml(item.target || "");
        const msg = escapeHtml(item.message || "");
        const ts = escapeHtml(toLocalTime(item.timestamp || "-"));
        const levelText = level.toUpperCase();
        const targetHtml = target ? `<span class="debug-target">@${target}</span>` : "";
        return `
          <div class="debug-line l-${level}">
            <span class="debug-ts">${ts}</span>
            <span class="debug-level">[${levelText}]</span>
            <span class="debug-source">[${source}]</span>
            ${targetHtml}
            <span>${msg}</span>
          </div>
        `;
      }).join("");
      if (state.debugAutoScroll) {
        wrap.scrollTop = wrap.scrollHeight;
      }
    }

    function appendDebugLogs(items) {
      if (!Array.isArray(items) || !items.length) return;
      state.debugLogs = state.debugLogs.concat(items);
      if (state.debugLogs.length > 1000) {
        state.debugLogs = state.debugLogs.slice(-1000);
      }
    }

    async function loadDebugLogs({ reset = false } = {}) {
      const sinceId = reset ? 0 : state.debugSinceId;
      const query = new URLSearchParams({
        since_id: String(sinceId),
        limit: "300",
        level: state.debugLevel,
        keyword: state.debugKeyword,
        source_group: state.debugSourceGroup
      });
      const data = await api(`/api/debug/logs?${query.toString()}`);
      const items = Array.isArray(data.items) ? data.items : [];
      if (reset) {
        state.debugLogs = items;
      } else {
        appendDebugLogs(items);
      }
      if (items.length) {
        const maxId = items.reduce((max, item) => Math.max(max, Number(item.id) || 0), 0);
        state.debugSinceId = Math.max(state.debugSinceId, maxId);
      } else if (reset) {
        state.debugSinceId = Number(data.last_id) || state.debugSinceId;
      }
      renderDebugLogs();
    }

    function startDebugPolling() {
      if (state.debugPollingTimer) {
        clearInterval(state.debugPollingTimer);
      }
      state.debugPollingTimer = setInterval(async () => {
        try {
          await loadDebugLogs();
        } catch (_err) {
          // Keep polling; transient API errors should not break the page loop.
        }
      }, 2500);
    }

    function setRunningState(running) {
      $("runFilteredBtn").disabled = running;
      $("runAllBtn").disabled = running;
      $("refreshBtn").disabled = running;
    }

    async function loadOverview() {
      const data = await api("/api/overview");
      state.rows = Array.isArray(data.rows) ? data.rows : [];
      state.latestJob = data.latest_job || state.latestJob;
      buildChips(data.counts || {}, state.rows.length);
      applyFilters();
      renderRows();
      renderJob();
      $("lastRefresh").textContent = t("last_refresh", { time: new Date().toLocaleString() });
    }

    async function loadLatestJob() {
      const data = await api("/api/jobs/latest");
      if (data.job) {
        state.latestJob = data.job;
        renderJob();
      }
    }

    function boolToSelect(value) {
      return value ? "true" : "false";
    }

    function parseBoolValue(text, defaultValue = false) {
      if (text === "true") return true;
      if (text === "false") return false;
      return defaultValue;
    }

    function toNumber(value, fallback = 0, min = null) {
      const n = Number(value);
      if (Number.isNaN(n)) return fallback;
      if (min !== null && n < min) return min;
      return n;
    }

    function cloneJson(value) {
      return JSON.parse(JSON.stringify(value || {}));
    }

    function splitTextList(text) {
      return String(text || "")
        .split(/[\n,]+/g)
        .map((x) => x.trim())
        .filter(Boolean);
    }

    function joinTextList(list) {
      if (!Array.isArray(list)) return "";
      return list.map((x) => String(x || "").trim()).filter(Boolean).join("\n");
    }

    function normalizeStrategy(strategy) {
      const mapping = {
        cmd: "command",
        command: "command",
        cargo_path_git: "cargo_path_git",
        git_cargo: "cargo_path_git",
        system_package: "system_package",
        package: "system_package",
        pkg: "system_package",
        system_pkg: "system_package"
      };
      const key = String(strategy || "").trim().toLowerCase();
      return mapping[key] || "command";
    }

    function defaultTargetByStrategy(strategy) {
      const normalized = normalizeStrategy(strategy);
      if (normalized === "cargo_path_git") {
        return {
          name: "",
          enabled: true,
          strategy: "cargo_path_git",
          check_interval_hours: 12,
          repo_path: "",
          binary_path: "",
          upstream_repo: "",
          branch: "",
          current_version_cmd: "",
          verify_cmd: "",
          build_commands: ["cargo install --path {repo_path}"]
        };
      }
      if (normalized === "system_package") {
        return {
          name: "",
          enabled: true,
          strategy: "system_package",
          check_interval_hours: 12,
          manager: "apt_get",
          package_name: "",
          require_sudo: true,
          sudo_prefix: "sudo",
          current_version_cmd: "",
          latest_version_cmd: "",
          update_commands: [],
          verify_cmd: ""
        };
      }
      return {
        name: "",
        enabled: true,
        strategy: "command",
        check_interval_hours: 24,
        current_version_cmd: "",
        latest_version_cmd: "",
        update_commands: [],
        verify_cmd: ""
      };
    }

    function managerOptionsHtml(selected) {
      const candidates = (
        state.configMeta
        && Array.isArray(state.configMeta.system_package_managers)
        && state.configMeta.system_package_managers.length
      )
        ? state.configMeta.system_package_managers
        : ["apt_get", "yum", "dnf", "pacman", "zypper", "choco", "winget", "brew"];
      return candidates.map((name) => {
        const sel = name === selected ? "selected" : "";
        return `<option value="${escapeHtml(name)}" ${sel}>${escapeHtml(name)}</option>`;
      }).join("");
    }

    function strategyOptionsHtml(selected) {
      const values = ["cargo_path_git", "command", "system_package"];
      return values.map((name) => {
        const sel = name === selected ? "selected" : "";
        return `<option value="${escapeHtml(name)}" ${sel}>${escapeHtml(name)}</option>`;
      }).join("");
    }

    function renderHumanTargetsEditor() {
      const listEl = $("cfgHumanTargetList");
      const draft = state.configDraft || {};
      const targets = Array.isArray(draft.human_targets) ? draft.human_targets : [];
      if (!targets.length) {
        listEl.innerHTML = `<div class="debug-empty">${t("cfg_no_targets")}</div>`;
        return;
      }
      listEl.innerHTML = targets.map((rawTarget, index) => {
        const target = Object.assign(defaultTargetByStrategy(rawTarget.strategy), rawTarget || {});
        target.strategy = normalizeStrategy(target.strategy);
        const enabledValue = target.enabled === false ? "false" : "true";
        return `
          <div class="cfg-target-card" data-cfg-card-index="${index}">
            <div class="cfg-target-head">
              <span class="cfg-mini">#${index + 1}</span>
              <button data-cfg-remove="${index}" class="warn">${t("cfg_target_remove")}</button>
            </div>
            <div class="cfg-row">
              <label class="cfg-label">
                <span>${t("cfg_field_name")}</span>
                <input data-cfg-index="${index}" data-cfg-field="name" type="text" value="${escapeHtml(target.name || "")}">
              </label>
              <label class="cfg-label">
                <span>${t("cfg_field_enabled")}</span>
                <select data-cfg-index="${index}" data-cfg-field="enabled">
                  <option value="true" ${enabledValue === "true" ? "selected" : ""}>true</option>
                  <option value="false" ${enabledValue === "false" ? "selected" : ""}>false</option>
                </select>
              </label>
              <label class="cfg-label">
                <span>${t("cfg_field_strategy")}</span>
                <select data-cfg-index="${index}" data-cfg-field="strategy">
                  ${strategyOptionsHtml(target.strategy)}
                </select>
              </label>
              <label class="cfg-label">
                <span>${t("cfg_field_interval")}</span>
                <input data-cfg-index="${index}" data-cfg-field="check_interval_hours" type="number" min="0" step="0.5" value="${escapeHtml(target.check_interval_hours || 0)}">
              </label>
            </div>
            ${renderTargetExtraFields(target, index)}
          </div>
        `;
      }).join("");
    }

    function updateTargetFieldFromEvent(target, field, value) {
      if (!target || !field) return;
      const listFields = new Set(["build_commands", "update_commands", "required_commands", "remote_candidates", "mirror_prefixes"]);
      if (field === "enabled" || field === "require_sudo") {
        target[field] = parseBoolValue(value, true);
        return;
      }
      if (field === "check_interval_hours") {
        target[field] = toNumber(value, 0, 0);
        return;
      }
      if (listFields.has(field)) {
        target[field] = splitTextList(value);
        return;
      }
      target[field] = String(value || "");
    }

    function setCfgStatus(message, type = "") {
      const el = $("cfgStatus");
      el.textContent = message || "";
      el.classList.remove("ok", "err");
      if (type === "ok") el.classList.add("ok");
      if (type === "err") el.classList.add("err");
    }

    function syncConfigModeVisibility() {
      const mode = $("cfgTargetMode").value || "human";
      const isDeveloper = mode === "developer";
      $("cfgHumanWrap").classList.toggle("hidden", isDeveloper);
      $("cfgDeveloperWrap").classList.toggle("hidden", !isDeveloper);
      $("cfgDryRunWrap").classList.toggle("hidden", !isDeveloper);
      $("cfgEnvTimeoutWrap").classList.toggle("hidden", !isDeveloper);
      if (state.configDraft) {
        state.configDraft.target_config_mode = mode;
      }
    }

    function fillConfigForm(config) {
      state.configDraft = cloneJson(config || {});
      state.configDraft.human_targets = Array.isArray(state.configDraft.human_targets)
        ? state.configDraft.human_targets
        : [];

      $("cfgEnabled").value = boolToSelect(Boolean(state.configDraft.enabled));
      $("cfgTargetMode").value = String(state.configDraft.target_config_mode || "human");
      $("cfgPollInterval").value = String(state.configDraft.poll_interval_minutes || 30);
      $("cfgDefaultCheckInterval").value = String(state.configDraft.default_check_interval_hours || 24);
      $("cfgAutoUpdate").value = boolToSelect(Boolean(state.configDraft.auto_update_on_schedule));
      $("cfgNotifyAdmin").value = boolToSelect(Boolean(state.configDraft.notify_admin_on_schedule));
      $("cfgNotifyNoop").value = boolToSelect(Boolean(state.configDraft.notify_on_schedule_noop));
      $("cfgDryRun").value = boolToSelect(Boolean(state.configDraft.dry_run));
      $("cfgEnvTimeout").value = String(state.configDraft.env_check_timeout_s || 8);
      $("cfgAdminSidList").value = joinTextList(state.configDraft.admin_sid_list || []);
      const webCfg = state.configDraft.web_admin || {};
      $("cfgWebEnabled").value = boolToSelect(Boolean(webCfg.enabled));
      $("cfgWebHost").value = String(webCfg.host || "127.0.0.1");
      $("cfgWebPort").value = String(webCfg.port || 8099);
      $("cfgWebPassword").value = String(webCfg.password || "");
      $("cfgTargetsJson").value = String(state.configDraft.targets_json || "");
      syncConfigModeVisibility();
      renderHumanTargetsEditor();
    }

    function collectConfigDraftFromForm() {
      const mode = $("cfgTargetMode").value || "human";
      const draft = cloneJson(state.configDraft || {});
      draft.enabled = parseBoolValue($("cfgEnabled").value, true);
      draft.target_config_mode = mode;
      draft.poll_interval_minutes = toNumber($("cfgPollInterval").value, 30, 1);
      draft.default_check_interval_hours = toNumber($("cfgDefaultCheckInterval").value, 24, 0);
      draft.auto_update_on_schedule = parseBoolValue($("cfgAutoUpdate").value, true);
      draft.notify_admin_on_schedule = parseBoolValue($("cfgNotifyAdmin").value, true);
      draft.notify_on_schedule_noop = parseBoolValue($("cfgNotifyNoop").value, false);
      draft.dry_run = parseBoolValue($("cfgDryRun").value, false);
      draft.env_check_timeout_s = toNumber($("cfgEnvTimeout").value, 8, 1);
      draft.admin_sid_list = splitTextList($("cfgAdminSidList").value || "");
      draft.web_admin = {
        enabled: parseBoolValue($("cfgWebEnabled").value, false),
        host: String($("cfgWebHost").value || "127.0.0.1").trim() || "127.0.0.1",
        port: toNumber($("cfgWebPort").value, 8099, 1),
        password: String($("cfgWebPassword").value || "")
      };
      if (mode === "developer") {
        draft.targets_json = String($("cfgTargetsJson").value || "");
      } else {
        draft.human_targets = Array.isArray(state.configDraft?.human_targets)
          ? state.configDraft.human_targets
          : [];
      }
      return draft;
    }

    async function loadConfigForModal() {
      setCfgStatus(t("cfg_status_loading"));
      const data = await api("/api/config");
      state.configMeta = data.meta || {};
      fillConfigForm(data.config || {});
      setCfgStatus("");
    }

    async function openConfigModal() {
      $("configModal").classList.remove("hidden");
      try {
        await loadConfigForModal();
      } catch (err) {
        setCfgStatus(t("cfg_status_load_failed", { msg: err.message }), "err");
      }
    }

    function closeConfigModal() {
      $("configModal").classList.add("hidden");
      setCfgStatus("");
    }

    async function saveConfigFromModal() {
      if (state.configSaving) return;
      const draft = collectConfigDraftFromForm();
      if ((draft.target_config_mode || "human") === "developer") {
        try {
          JSON.parse(draft.targets_json || "{}");
        } catch (err) {
          setCfgStatus(t("cfg_status_invalid_json", { msg: err.message }), "err");
          return;
        }
      }
      state.configSaving = true;
      $("cfgSaveBtn").disabled = true;
      setCfgStatus(t("cfg_status_saving"));
      try {
        const payload = await api("/api/config", {
          method: "POST",
          body: JSON.stringify({ config: draft })
        });
        state.configMeta = payload.meta || state.configMeta;
        fillConfigForm(payload.config || draft);
        setCfgStatus(t("cfg_status_saved"), "ok");
        await loadOverview();
        await loadLatestJob();
      } catch (err) {
        setCfgStatus(t("cfg_status_save_failed", { msg: err.message }), "err");
      } finally {
        state.configSaving = false;
        $("cfgSaveBtn").disabled = false;
      }
    }

    async function pollJob(jobId) {
      if (state.pollingTimer) {
        clearInterval(state.pollingTimer);
      }
      setRunningState(true);
      state.pollingTimer = setInterval(async () => {
        try {
          const data = await api(`/api/jobs/${encodeURIComponent(jobId)}`);
          state.latestJob = data.job || null;
          renderJob();
          const status = state.latestJob ? state.latestJob.status : "";
          if (["success", "partial", "error"].includes(status)) {
            clearInterval(state.pollingTimer);
            state.pollingTimer = null;
            setRunningState(false);
            await loadOverview();
            state.debugSinceId = 0;
            await loadDebugLogs({ reset: true });
          }
        } catch (err) {
          clearInterval(state.pollingTimer);
          state.pollingTimer = null;
          setRunningState(false);
          alert(t("err_poll_job", { msg: err.message }));
        }
      }, 2000);
    }

    async function submitRun(scope, targets) {
      const payload = { scope, targets };
      const data = await api("/api/run", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      state.latestJob = data.job || null;
      renderJob();
      if (state.latestJob && state.latestJob.id) {
        await pollJob(state.latestJob.id);
      } else {
        await loadOverview();
      }
    }

    function getEnabledFilteredTargets() {
      return state.filteredRows.filter((row) => row.enabled).map((row) => row.software_name);
    }

    function getEnabledAllTargets() {
      return state.rows.filter((row) => row.enabled).map((row) => row.software_name);
    }

    async function onRunFiltered() {
      const targets = getEnabledFilteredTargets();
      if (!targets.length) {
        alert(t("alert_no_filtered"));
        return;
      }
      const confirmed = window.confirm(
        t("confirm_run_filtered", {
          n: targets.length,
          targets: targets.join(", "),
        }),
      );
      if (!confirmed) return;
      await submitRun("filtered", targets);
    }

    async function onRunAll() {
      const targets = getEnabledAllTargets();
      if (!targets.length) {
        alert(t("alert_no_all"));
        return;
      }
      const confirmed = window.confirm(
        t("confirm_run_all", {
          n: targets.length,
          targets: targets.join(", "),
        }),
      );
      if (!confirmed) return;
      await submitRun("all", targets);
    }

    function bindEvents() {
      $("searchInput").addEventListener("input", (evt) => {
        state.keyword = evt.target.value || "";
        applyFilters();
        renderRows();
      });

      $("statusFilter").addEventListener("change", (evt) => {
        state.status = evt.target.value || "all";
        applyFilters();
        renderRows();
      });

      $("clearFilterBtn").addEventListener("click", () => {
        state.keyword = "";
        state.status = "all";
        $("searchInput").value = "";
        $("statusFilter").value = "all";
        applyFilters();
        renderRows();
      });

      $("refreshBtn").addEventListener("click", async () => {
        await loadOverview();
        await loadLatestJob();
        state.debugSinceId = 0;
        await loadDebugLogs({ reset: true });
      });

      $("themeBtn").addEventListener("click", () => {
        state.themeIndex = (state.themeIndex + 1) % state.themes.length;
        document.body.dataset.theme = state.themes[state.themeIndex];
        persistPreferences();
      });

      $("langSelect").addEventListener("change", (evt) => {
        const lang = evt.target.value || "zh";
        state.lang = ["zh", "en"].includes(lang) ? lang : "zh";
        persistPreferences();
        applyI18nTexts();
      });

      $("densitySelect").addEventListener("change", (evt) => {
        state.density = evt.target.value || "compact";
        document.body.dataset.density = state.density;
        persistPreferences();
      });

      $("runFilteredBtn").addEventListener("click", async () => {
        try {
          await onRunFiltered();
        } catch (err) {
          alert(t("err_run_filtered", { msg: err.message }));
        }
      });

      $("runAllBtn").addEventListener("click", async () => {
        try {
          await onRunAll();
        } catch (err) {
          alert(t("err_run_all", { msg: err.message }));
        }
      });

      $("openConfigBtn").addEventListener("click", async () => {
        await openConfigModal();
      });

      $("cfgCloseBtn").addEventListener("click", () => {
        closeConfigModal();
      });

      $("cfgReloadBtn").addEventListener("click", async () => {
        try {
          await loadConfigForModal();
        } catch (err) {
          setCfgStatus(t("cfg_status_load_failed", { msg: err.message }), "err");
        }
      });

      $("cfgSaveBtn").addEventListener("click", async () => {
        await saveConfigFromModal();
      });

      $("cfgTargetMode").addEventListener("change", () => {
        syncConfigModeVisibility();
      });

      $("cfgAddTargetBtn").addEventListener("click", () => {
        if (!state.configDraft) {
          state.configDraft = { human_targets: [] };
        }
        if (!Array.isArray(state.configDraft.human_targets)) {
          state.configDraft.human_targets = [];
        }
        const template = $("cfgAddTargetType").value || "command";
        state.configDraft.human_targets.push(defaultTargetByStrategy(template));
        renderHumanTargetsEditor();
      });

      $("cfgHumanTargetList").addEventListener("click", (evt) => {
        const button = evt.target.closest("[data-cfg-remove]");
        if (!button) return;
        const index = Number(button.getAttribute("data-cfg-remove"));
        if (!Array.isArray(state.configDraft?.human_targets)) return;
        if (Number.isNaN(index) || index < 0 || index >= state.configDraft.human_targets.length) return;
        state.configDraft.human_targets.splice(index, 1);
        renderHumanTargetsEditor();
      });

      const onHumanTargetInput = (evt) => {
        const el = evt.target;
        const index = Number(el?.dataset?.cfgIndex);
        const field = el?.dataset?.cfgField;
        if (Number.isNaN(index) || !field) return;
        if (!Array.isArray(state.configDraft?.human_targets)) return;
        const target = state.configDraft.human_targets[index];
        if (!target) return;
        const value = typeof el.value === "string" ? el.value : "";
        if (field === "strategy") {
          const normalized = normalizeStrategy(value);
          const merged = Object.assign(
            defaultTargetByStrategy(normalized),
            target,
            { strategy: normalized },
          );
          state.configDraft.human_targets[index] = merged;
          renderHumanTargetsEditor();
          return;
        }
        updateTargetFieldFromEvent(target, field, value);
      };
      $("cfgHumanTargetList").addEventListener("input", onHumanTargetInput);
      $("cfgHumanTargetList").addEventListener("change", onHumanTargetInput);

      $("configModal").addEventListener("click", (evt) => {
        if (evt.target?.id === "configModal") {
          closeConfigModal();
        }
      });

      $("debugLevelFilter").addEventListener("change", async (evt) => {
        state.debugLevel = evt.target.value || "all";
        state.debugSinceId = 0;
        await loadDebugLogs({ reset: true });
      });

      const tabRoot = $("debugTabs");
      if (tabRoot) {
        tabRoot.querySelectorAll("[data-group]").forEach((el) => {
          el.addEventListener("click", async () => {
            const group = el.getAttribute("data-group") || "all";
            if (group === state.debugSourceGroup) return;
            state.debugSourceGroup = group;
            state.debugSinceId = 0;
            syncDebugTabButtons();
            await loadDebugLogs({ reset: true });
          });
        });
      }

      $("debugKeywordInput").addEventListener("input", (evt) => {
        state.debugKeyword = evt.target.value || "";
        if (state.debugKeywordTimer) {
          clearTimeout(state.debugKeywordTimer);
        }
        state.debugKeywordTimer = setTimeout(async () => {
          state.debugSinceId = 0;
          await loadDebugLogs({ reset: true });
        }, 300);
      });

      $("debugToggleScrollBtn").addEventListener("click", () => {
        state.debugAutoScroll = !state.debugAutoScroll;
        syncDebugAutoScrollBtn();
      });

      $("debugClearBtn").addEventListener("click", async () => {
        const confirmed = window.confirm(t("confirm_clear_logs"));
        if (!confirmed) return;
        await api("/api/debug/clear", {
          method: "POST",
          body: JSON.stringify({})
        });
        state.debugLogs = [];
        state.debugSinceId = 0;
        await loadDebugLogs({ reset: true });
      });
    }

    async function boot() {
      applyPreferences();
      applyI18nTexts();
      syncDebugTabButtons();
      bindEvents();
      try {
        await ensureAuth();
        await loadOverview();
        await loadLatestJob();
        await loadDebugLogs({ reset: true });
        startDebugPolling();
      } catch (err) {
        alert(t("err_init", { msg: err.message }));
      }
    }

    boot();
  </script>
</body>
</html>
