<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1e293b"/>
            <stop offset="100%" stop-color="#020617"/>
        </radialGradient>
        
        <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="50%" stop-color="#818cf8" />
            <stop offset="100%" stop-color="#c084fc" />
        </linearGradient>

        <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#e0e7ff" />
            <stop offset="100%" stop-color="#818cf8" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="500" height="500" fill="url(#bgGrad)" rx="60" />

    <circle cx="250" cy="230" r="170" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8 8" opacity="0.6"/>
    <circle cx="250" cy="230" r="140" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.8"/>
    
    <circle cx="100" cy="100" r="2" fill="#fff" opacity="0.5" />
    <circle cx="400" cy="120" r="3" fill="#38bdf8" opacity="0.6" filter="url(#glow)"/>
    <circle cx="120" cy="350" r="1.5" fill="#fff" opacity="0.4" />
    <circle cx="380" cy="340" r="2" fill="#c084fc" opacity="0.7" filter="url(#glow)"/>
    <circle cx="250" cy="50" r="1.5" fill="#fff" opacity="0.8" />

    <g transform="translate(0, -20)">
        <path d="M 250 250 C 320 150, 410 150, 410 250 C 410 350, 320 350, 250 250 C 180 150, 90 150, 90 250 C 90 350, 180 350, 250 250 Z" 
              fill="none" stroke="url(#syncGrad)" stroke-width="18" stroke-linecap="round" filter="url(#glowStrong)" opacity="0.3"/>
              
        <path d="M 250 250 C 320 150, 410 150, 410 250 C 410 350, 320 350, 250 250 C 180 150, 90 150, 90 250 C 90 350, 180 350, 250 250 Z" 
              fill="none" stroke="url(#syncGrad)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
              
        <path d="M 250 250 C 320 150, 410 150, 410 250 C 410 350, 320 350, 250 250 C 180 150, 90 150, 90 250 C 90 350, 180 350, 250 250 Z" 
              fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>

        <path d="M 250 250 C 320 150, 410 150, 410 250 C 410 350, 320 350, 250 250 C 180 150, 90 150, 90 250 C 90 350, 180 350, 250 250 Z" 
              fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 16" opacity="0.6"/>

        <path d="M 395 240 L 410 260 L 425 240 Z" fill="#c084fc" filter="url(#glow)"/>
        <path d="M 75 240 L 90 260 L 105 240 Z" fill="#38bdf8" filter="url(#glow)"/>

        <path d="M 250 120 Q 250 250 120 250 Q 250 250 250 380 Q 250 250 380 250 Q 250 250 250 120 Z" fill="url(#syncGrad)" opacity="0.25" filter="url(#glowStrong)"/>
        
        <path d="M 250 150 Q 250 250 150 250 Q 250 250 250 350 Q 250 250 350 250 Q 250 250 250 150 Z" fill="url(#starGrad)" filter="url(#glow)"/>
        
        <path d="M 250 180 Q 250 250 180 250 Q 250 250 250 320 Q 250 250 320 250 Q 250 250 250 180 Z" fill="#ffffff" opacity="0.95"/>
        
        <polygon points="250,235 265,250 250,265 235,250" fill="#818cf8" filter="url(#glow)"/>
    </g>

    <text x="250" y="435" font-family="'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">OneSync</text>
    <text x="250" y="465" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="5">ASTRBOT PLUGIN</text>
</svg>
